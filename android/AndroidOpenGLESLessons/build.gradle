// Top-level build file where you can add configuration options common to all sub-projects/modules.
buildscript {
    repositories {
        jcenter()
        google()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:4.1.2'
    }
}

allprojects {
    repositories {
        google()
        jcenter()
    }
}

buildTypes {
    release {
        minifyEnabled true
        // Temporarily point to the debug signing config
        signingConfig signingConfigs.debug 
        // OR comment out the signingConfig line entirely
    }
}

android {
    defaultConfig {
        externalNativeBuild {
            cmake {
                abiFilters "arm64-v8a"
            }
        }
    }
}
